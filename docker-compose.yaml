services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

  fronend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A agent.worker.celery_app:app worker --loglevel=info
    depends_on:
      - redis