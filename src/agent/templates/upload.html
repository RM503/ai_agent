<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Audio</title>
  <link rel="stylesheet" href="../static/css/upload.css">
</head>
<body>
  <a href="/">← Back to Home</a>
  <h1 style="text-align: center;">Upload Audio</h1>
    <p> Upload an audio file for transcription. The transcription results will be streamed in the
        box below the file upload area.
    </p>

  <div id="drop-zone">
    <p>Drag & drop an audio file here</p>
    <p>or click to select</p>
    <input type="file" id="file-input" accept="audio/*" hidden>
  </div>

  <p id="status"></p>

  <div id="actions">
    <a id="download-link" href="#">Download transcript</a>
  </div>

  <div id="live"></div>

  <script src="../static/js/upload.js"></script>
</body>
</html>
